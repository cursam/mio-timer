<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Trap Studio v3</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .rack { width: 450px; background: var(--panel); border: 2px solid #333; border-radius: 15px; padding: 25px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        
        .screen { background: #000; height: 80px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--accent); position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .section-title { font-size: 0.6rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .param { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.65rem; color: #888; }
        input[type=range] { accent-color: var(--accent); cursor: pointer; }

        .beats { display: flex; gap: 10px; margin-bottom: 20px; }
        .beat-btn { flex: 1; padding: 8px; font-size: 0.7rem; background: #222; border: 1px solid #444; color: white; cursor: pointer; }
        .beat-btn.active { border-color: var(--accent); color: var(--accent); }

        .main-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.action { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #recBtn { background: #ff0044; color: white; }
        #recBtn.recording { animation: blink 1s infinite; }
        #playBtn { background: #333; color: white; }
        
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="rack">
    <div class="section-title">DIGITAL SIGNAL PROCESSOR</div>
    <div class="screen"><canvas id="wave"></canvas></div>

    <div class="section-title">AUTOTUNE PARAMETERS</div>
    <div class="controls">
        <div class="param">
            <label>RETUNE SPEED (SHIVA -> SFERA)</label>
            <input type="range" id="retune" min="0" max="100" value="50">
        </div>
        <div class="param">
            <label>VOCAL DEPTH (PITCH)</label>
            <input type="range" id="depth" min="0" max="100" value="50">
        </div>
        <div class="param">
            <label>AMBIENCE (REVERB)</label>
            <input type="range" id="reverb" min="0" max="100" value="30">
        </div>
        <div class="param">
            <label>OUTPUT GAIN</label>
            <input type="range" id="gain" min="0" max="100" value="80">
        </div>
    </div>

    <div class="section-title">SELECT INSTRUMENTAL</div>
    <div class="beats">
        <button class="beat-btn" onclick="setBeat('trap')">TRAP</button>
        <button class="beat-btn" onclick="setBeat('drill')">DRILL</button>
        <button class="beat-btn" onclick="setBeat('melodic')">MELODIC</button>
    </div>

    <div class="main-btns">
        <button id="recBtn" class="action" onclick="toggleRec()">START SESSION</button>
        <button id="playBtn" class="action" disabled onclick="playBack()">RIASCOLTA</button>
    </div>
</div>

<script>
    let audioCtx, mic, analyser, processor, mediaRecorder, chunks = [];
    let beatAudio = new Audio();

    async function init() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mic = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        
        // Catena Effetti
        const reverbNode = audioCtx.createConvolver(); // Qui servirebbe un impulso, simuliamo con delay
        const delay = audioCtx.createDelay();
        delay.delayTime.value = 0.1;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = "peaking";
        
        const dest = audioCtx.createMediaStreamDestination();

        mic.connect(filter);
        filter.connect(delay);
        delay.connect(analyser);
        analyser.connect(audioCtx.destination);
        delay.connect(dest);

        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/wav' });
            window.lastRecording = URL.createObjectURL(blob);
            document.getElementById('playBtn').disabled = false;
        };

        draw();
    }

    function setBeat(type) {
        // Qui carichiamo basi royalty-free da internet
        const urls = {
            'trap': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', // Esempio
            'drill': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
            'melodic': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
        };
        beatAudio.src = urls[type];
        document.querySelectorAll('.beat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    async function toggleRec() {
        if(!audioCtx) await init();
        const btn = document.getElementById('recBtn');
        if(mediaRecorder.state === "inactive") {
            chunks = [];
            mediaRecorder.start();
            beatAudio.play();
            btn.innerText = "STOP & SAVE";
            btn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            beatAudio.pause();
            beatAudio.currentTime = 0;
            btn.innerText = "START SESSION";
            btn.classList.remove('recording');
        }
    }

    function playBack() {
        const a = new Audio(window.lastRecording);
        a.play();
    }

    function draw() {
        requestAnimationFrame(draw);
        if(!analyser) return;
        const canvas = document.getElementById('wave');
        const c = canvas.getContext('2d');
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        c.fillStyle = '#000';
        c.fillRect(0,0,canvas.width, canvas.height);
        c.strokeStyle = '#00f2ff';
        c.beginPath();
        for(let i=0; i<data.length; i++) {
            let x = i * (canvas.width / data.length);
            let y = (data[i]/128) * (canvas.height/2);
            if(i===0) c.moveTo(x,y); else c.lineTo(x,y);
        }
        c.stroke();
    }
</script>
</body>
</html>
