<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap Studio - REC & TUNE</title>
    <style>
        :root {
            --glow: #ff0055; /* Rosso neon per la versione REC */
            --dark: #080808;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .studio-rack {
            width: 90%;
            max-width: 450px;
            background: #111;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .display {
            background: #000;
            height: 100px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #micBtn { background: #333; color: white; }
        #micBtn.active { background: #00ff41; color: black; box-shadow: 0 0 15px #00ff41; }

        #recBtn { background: #331111; color: #ff4444; border: 1px solid #ff4444; }
        #recBtn.recording { background: #ff4444; color: white; animation: blink 1s infinite; }

        #playBtn { background: #111133; color: #4444ff; border: 1px solid #4444ff; }
        #playBtn:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .label { font-size: 0.7rem; color: #666; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="studio-rack">
    <div style="color: #444; font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 10px;">TRAP VOCAL ENGINE v2.0</div>
    
    <div class="display">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls-grid">
        <button id="micBtn">1. Attiva Mic</button>
        <button id="recBtn" disabled>2. REC</button>
    </div>
    
    <button id="playBtn" style="width: 100%;" disabled>3. Riascolta Registrazione</button>
    
    <span class="label">Il riascolto include l'effetto bit-tuner applicato</span>
    <audio id="audioPlayback" style="display:none"></audio>
</div>

<script>
    let audioCtx, mic, processor, analyser, mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const micBtn = document.getElementById('micBtn');
    const recBtn = document.getElementById('recBtn');
    const playBtn = document.getElementById('playBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function init() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Setup Audio Node
        mic = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        
        // Destinazione per la registrazione (con effetto)
        const dest = audioCtx.createMediaStreamDestination();
        
        // Processore Effetto (Trap/Bitcrush)
        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (e) => {
            let input = e.inputBuffer.getChannelData(0);
            let output = e.outputBuffer.getChannelData(0);
            for (let i = 0; i < input.length; i++) {
                // Effetto "Sfera/Plaza" - Quantizzazione
                output[i] = Math.round(input[i] * 12) / 12; 
            }
        };

        // Connessioni: Mic -> Processor -> Analyser -> Output & Destination
        mic.connect(processor);
        processor.connect(analyser);
        analyser.connect(audioCtx.destination);
        processor.connect(dest);

        // Setup Registratore
        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);
            document.getElementById('audioPlayback').src = audioUrl;
            playBtn.disabled = false;
        };

        micBtn.classList.add('active');
        micBtn.innerText = "MIC ONLINE";
        recBtn.disabled = false;
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = isRecording ? '#ff0055' : '#00ff41';
        ctx.lineWidth = 2;
        ctx.beginPath();
        let x = 0;
        for(let i=0; i<data.length; i++) {
            let y = (data[i]/128.0) * canvas.height/2;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            x += canvas.width/data.length;
        }
        ctx.stroke();
    }

    micBtn.onclick = () => { if(!audioCtx) init(); };

    recBtn.onclick = () => {
        if(!isRecording) {
            audioChunks = [];
            mediaRecorder.start();
            isRecording = true;
            recBtn.classList.add('recording');
            recBtn.innerText = "STOP";
            playBtn.disabled = true;
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recBtn.classList.remove('recording');
            recBtn.innerText = "2. REC";
        }
    };

    playBtn.onclick = () => {
        document.getElementById('audioPlayback').play();
    };
</script>

</body>
</html>
