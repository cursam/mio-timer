<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP-TUNER Elite</title>
    <style>
        :root {
            --glow: #00ff41;
            --dark: #0a0a0a;
            --panel: #151515;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif; /* Un font futuristico sarebbe top */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .rack-case {
            width: 90%;
            max-width: 500px;
            background: var(--panel);
            border: 3px solid #333;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,1), inset 0 0 10px rgba(255,255,255,0.05);
        }

        .display-screen {
            background: #001100;
            border: 2px solid #222;
            height: 120px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }

        .brand {
            font-size: 0.7rem;
            color: var(--glow);
            text-align: right;
            letter-spacing: 3px;
        }

        .knobs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 0;
        }

        .parameter {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.6rem;
            color: #888;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--glow);
        }

        .btn-power {
            background: #222;
            border: 1px solid var(--glow);
            color: var(--glow);
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-power:hover {
            background: var(--glow);
            color: #000;
            box-shadow: 0 0 15px var(--glow);
        }

        .active-led {
            width: 8px;
            height: 8px;
            background: #f00;
            border-radius: 50%;
            margin: 10px auto;
            box-shadow: 0 0 5px #f00;
        }
    </style>
</head>
<body>

<div class="rack-case">
    <div class="brand">PRO SERIES // TRAP TUNER</div>
    
    <div class="display-screen">
        <canvas id="scope"></canvas>
    </div>

    <div class="knobs">
        <div class="parameter">
            <label>RETUNE SPEED (AUTO)</label>
            <input type="range" min="0" max="100" value="100">
            <span>HARD TUNE: MAX</span>
        </div>
        <div class="parameter">
            <label>ROBOTIC MIX</label>
            <input type="range" id="wet" min="0" max="100" value="80">
        </div>
    </div>

    <button id="onOff" class="btn-power">ENGAGE AUTOTUNE</button>
    <div id="led" class="active-led" style="background: #300; box-shadow: none;"></div>
</div>

<script>
    let ctx, mic, processor, analyser;
    const btn = document.getElementById('onOff');
    const canvas = document.getElementById('scope');
    const cc = canvas.getContext('2d');

    async function start() {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mic = ctx.createMediaStreamSource(stream);
        
        analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        
        // Effetto "Metal" tramite Bitcrusher (simula la texture dei rapper)
        const bufferSize = 4096;
        processor = ctx.createScriptProcessor(bufferSize, 1, 1);
        
        processor.onaudioprocess = function(e) {
            const input = e.inputBuffer.getChannelData(0);
            const output = e.outputBuffer.getChannelData(0);
            const wet = document.getElementById('wet').value / 100;

            for (let i = 0; i < bufferSize; i++) {
                // Semplice algoritmo di quantizzazione dell'ampiezza per suonare "trap"
                // Crea quel suono un po' sporco e digitale
                let val = input[i];
                if(wet > 0.5) {
                    val = Math.round(val * 16) / 16; 
                }
                output[i] = val;
            }
        };

        mic.connect(processor);
        processor.connect(analyser);
        analyser.connect(ctx.destination);

        document.getElementById('led').style.background = '#00ff41';
        document.getElementById('led').style.boxShadow = '0 0 10px #00ff41';
        btn.innerText = "SISTEMA ATTIVO";
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        cc.fillStyle = '#001100';
        cc.fillRect(0, 0, canvas.width, canvas.height);
        cc.lineWidth = 2;
        cc.strokeStyle = '#00ff41';
        cc.beginPath();
        let sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
        let x = 0;
        for(let i = 0; i < analyser.frequencyBinCount; i++) {
            let v = data[i] / 128.0;
            let y = v * canvas.height / 2;
            if(i === 0) cc.moveTo(x, y); else cc.lineTo(x, y);
            x += sliceWidth;
        }
        cc.stroke();
    }

    btn.onclick = () => { if(!ctx) start(); };
</script>

</body>
</html>
