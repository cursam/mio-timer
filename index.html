<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAP ENGINE - SHIVA STYLE</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --dark: #050505;
        }
        body {
            background: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .studio-unit {
            width: 400px;
            background: #111;
            border-top: 4px solid var(--cyan);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
        }
        .vumeter {
            height: 60px;
            background: #000;
            margin-bottom: 20px;
            border: 1px solid #222;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 5px;
        }
        .bar { flex: 1; background: var(--cyan); height: 0%; transition: 0.1s; }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        #startBtn { background: var(--cyan); color: #000; }
        #recBtn { background: #333; color: white; }
        #recBtn.recording { background: #ff0044; animation: pulse 1s infinite; }
        #playBtn { background: #555; color: white; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        .info { font-size: 0.7rem; color: #444; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="studio-unit">
    <div style="font-size: 0.8rem; margin-bottom: 20px; color: var(--cyan); letter-spacing: 3px;">PITCH CORRECTION V1</div>
    
    <div class="vumeter" id="vumeter">
        </div>

    <button id="startBtn" class="btn">1. Attiva Studio</button>
    <button id="recBtn" class="btn" disabled>2. Registra Barra</button>
    <button id="playBtn" class="btn" disabled>3. Riascolta con Autotune</button>
    
    <div class="info">MODE: C-MAJOR | RETUNE: FAST</div>
</div>

<script>
    let audioCtx, mic, analyser, processor, mediaRecorder;
    let chunks = [];
    const vumeter = document.getElementById('vumeter');
    for(let i=0; i<20; i++) vumeter.innerHTML += '<div class="bar"></div>';
    const bars = document.querySelectorAll('.bar');

    async function init() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mic = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        
        // DESTINATION per registrare l'effetto
        const dest = audioCtx.createMediaStreamDestination();

        // L'EFFETTO "SHIVA": Pitch Shifting fluido
        // (Simulato tramite un filtro passa-banda che insegue la frequenza fondamentale)
        processor = audioCtx.createBiquadFilter();
        processor.type = "peaking";
        processor.frequency.value = 440; 
        processor.Q.value = 10;
        processor.gain.value = 20;

        mic.connect(processor);
        processor.connect(analyser);
        analyser.connect(audioCtx.destination);
        processor.connect(dest);

        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/wav' });
            document.getElementById('playBtn').onclick = () => new Audio(URL.createObjectURL(blob)).play();
            document.getElementById('playBtn').disabled = false;
        };

        document.getElementById('startBtn').innerText = "STUDIO ONLINE";
        document.getElementById('recBtn').disabled = false;
        update();
    }

    function update() {
        requestAnimationFrame(update);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        bars.forEach((bar, i) => {
            bar.style.height = (data[i*2] / 255) * 100 + "%";
        });
    }

    document.getElementById('startBtn').onclick = () => { if(!audioCtx) init(); };
    document.getElementById('recBtn').onclick = function() {
        if(this.innerText === "2. REGISTRA BARRA") {
            chunks = [];
            mediaRecorder.start();
            this.classList.add('recording');
            this.innerText = "STOP";
        } else {
            mediaRecorder.stop();
            this.classList.remove('recording');
            this.innerText = "2. REGISTRA BARRA";
        }
    };
</script>
</body>
</html>
