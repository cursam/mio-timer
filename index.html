<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM TRAP STUDIO</title>
    <style>
        :root { --neon: #00ff9d; --darker: #050505; --panel: #121212; }
        body { background: var(--darker); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .studio-pro { width: 480px; background: var(--panel); border: 1px solid #333; border-radius: 20px; padding: 30px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        
        .vocal-monitor { background: #000; height: 120px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #222; position: relative; }
        canvas { width: 100%; height: 100%; border-radius: 10px; }

        .rack-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 4px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        
        .grid-sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.7rem; color: #777; font-weight: 600; }
        
        input[type=range] { -webkit-appearance: none; background: #222; height: 4px; border-radius: 5px; accent-color: var(--neon); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 15px; width: 15px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); cursor: pointer; }

        .transport { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; }
        button { padding: 18px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.8rem; }
        
        #mainBtn { background: var(--neon); color: #000; }
        #recBtn { background: #1a1a1a; color: #ff3366; border: 1px solid #331111; }
        #recBtn.recording { background: #ff3366; color: white; box-shadow: 0 0 20px #ff3366; }
        
        .playback-zone { margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; display: none; }
        #playBtn { background: #222; color: #fff; width: 100%; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="studio-pro">
    <div class="rack-label">PREMIUM VOCAL PROCESSOR</div>
    
    <div class="vocal-monitor">
        <canvas id="scope"></canvas>
    </div>

    <div class="grid-sliders">
        <div class="control-group">
            <label>AUTOTUNE (SHARP)</label>
            <input type="range" id="tune" min="0" max="100" value="90">
        </div>
        <div class="control-group">
            <label>COMPRESSION (POWER)</label>
            <input type="range" id="comp" min="0" max="100" value="80">
        </div>
        <div class="control-group">
            <label>REVERB (SPACE)</label>
            <input type="range" id="verb" min="0" max="100" value="40">
        </div>
        <div class="control-group">
            <label>SQUASH (LIMITER)</label>
            <input type="range" id="limit" min="0" max="100" value="70">
        </div>
    </div>

    <div class="transport">
        <button id="mainBtn" onclick="initStudio()">Engine On</button>
        <button id="recBtn" onclick="toggleRec()" disabled>Rec Session</button>
    </div>

    <div id="playZone" class="playback-zone">
        <button id="playBtn" onclick="playFinal()">Play Last Take</button>
    </div>
</div>

<script>
    let audioCtx, mic, compressor, limiter, reverb, analyser, mediaRecorder, chunks = [];

    async function initStudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mic = audioCtx.createMediaStreamSource(stream);
        
        // 1. COMPRESSORE (Per la potenza di Sfera)
        compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-30, audioCtx.currentTime);
        compressor.knee.setValueAtTime(40, audioCtx.currentTime);
        compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
        compressor.attack.setValueAtTime(0, audioCtx.currentTime);
        compressor.release.setValueAtTime(0.25, audioCtx.currentTime);

        // 2. LIMITER (Per non far gracchiare)
        limiter = audioCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-1, audioCtx.currentTime);

        // 3. ANALYSER
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;

        // 4. DESTINATION PER REGISTRAZIONE
        const dest = audioCtx.createMediaStreamDestination();

        // CATENA: MIC -> COMP -> LIMIT -> ANALYSER -> OUT
        mic.connect(compressor);
        compressor.connect(limiter);
        limiter.connect(analyser);
        analyser.connect(audioCtx.destination);
        limiter.connect(dest);

        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/wav' });
            window.recordedUrl = URL.createObjectURL(blob);
            document.getElementById('playZone').style.display = 'block';
        };

        document.getElementById('mainBtn').innerText = "ENGINE ACTIVE";
        document.getElementById('mainBtn').style.opacity = "0.5";
        document.getElementById('recBtn').disabled = false;
        render();
    }

    function toggleRec() {
        const btn = document.getElementById('recBtn');
        if(mediaRecorder.state === "inactive") {
            chunks = [];
            mediaRecorder.start();
            btn.innerText = "Stop Rec";
            btn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            btn.innerText = "Rec Session";
            btn.classList.remove('recording');
        }
    }

    function playFinal() {
        new Audio(window.recordedUrl).play();
    }

    function render() {
        requestAnimationFrame(render);
        const canvas = document.getElementById('scope');
        const c = canvas.getContext('2d');
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        
        c.fillStyle = '#000';
        c.fillRect(0,0,canvas.width, canvas.height);
        c.lineWidth = 3;
        c.strokeStyle = '#00ff9d';
        c.beginPath();
        let x = 0;
        for(let i=0; i<data.length; i++) {
            let y = (data[i]/128) * (canvas.height/2);
            if(i===0) c.moveTo(x,y); else c.lineTo(x,y);
            x += canvas.width/data.length;
        }
        c.stroke();
    }
</script>
</body>
</html>
